# Standalone Postgres for Broadcast on Dokku.
#
# Why not the dokku-postgres plugin? Broadcast needs THREE databases
# (broadcast_primary_production, broadcast_queue_production, broadcast_cable_production)
# owned by a single superuser, with fixed names the app hardcodes. The plugin gives
# one db per service with a random name, so we run Postgres directly and reuse the
# vendor's own multi-db init script (../../db/init-scripts) — which means `git pull`
# keeps the DB bootstrap in sync with upstream.
#
# This attaches to the EXTERNAL `broadcast` Docker network that the Dokku app also
# joins, so the app reaches Postgres by the hostname `broadcast-postgres`.
#
#   cd dokku/postgres && cp .env.sample .env   # then edit
#   docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: broadcast-postgres
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./backups:/backups
      - postgres-data:/var/lib/postgresql/data
      # Reuse the vendor's multi-database bootstrap, verbatim:
      - ../../db/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broadcast"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - broadcast
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:

networks:
  # Created once with: dokku network:create broadcast
  broadcast:
    external: true
